<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <style>
      .tree-dark { fill: #1D7C5A; }
      .tree-medium { fill: #4A9B7F; }
      .tree-light { fill: #8BC34A; }
      .tree-yellow { fill: #C5D86D; }
      .tree-sage { fill: #7CB08A; }
      .trunk { fill: #2D2D2D; }
    </style>
  </defs>

  <!-- Row of abstract trees -->
  <!-- Tree 1 - Tall rounded -->
  <rect class="trunk" x="30" y="120" width="4" height="80"/>
  <ellipse class="tree-sage" cx="32" cy="90" rx="25" ry="50"/>

  <!-- Tree 2 - Wide circular -->
  <rect class="trunk" x="80" y="140" width="4" height="60"/>
  <circle class="tree-yellow" cx="82" cy="110" r="35"/>

  <!-- Tree 3 - Tall thin -->
  <rect class="trunk" x="140" y="100" width="3" height="100"/>
  <ellipse class="tree-light" cx="141" cy="60" rx="18" ry="55"/>

  <!-- Tree 4 - O shape (donut tree) -->
  <rect class="trunk" x="190" y="150" width="4" height="50"/>
  <circle class="tree-medium" cx="192" cy="120" r="30"/>
  <circle fill="#1D7C5A" cx="192" cy="120" r="12" opacity="0.3"/>

  <!-- Tree 5 - Wide low -->
  <rect class="trunk" x="250" y="160" width="4" height="40"/>
  <ellipse class="tree-dark" cx="252" cy="140" rx="40" ry="25"/>

  <!-- Tree 6 - Tall elegant -->
  <rect class="trunk" x="310" y="110" width="3" height="90"/>
  <ellipse class="tree-sage" cx="311" cy="70" rx="20" ry="50"/>

  <!-- Tree 7 - Small round -->
  <rect class="trunk" x="360" y="150" width="3" height="50"/>
  <circle class="tree-yellow" cx="361" cy="125" r="28"/>

  <!-- Background organic shapes for depth -->
  <ellipse class="tree-light" cx="60" cy="180" rx="45" ry="30" opacity="0.4"/>
  <ellipse class="tree-sage" cx="160" cy="185" rx="35" ry="25" opacity="0.3"/>
  <ellipse class="tree-yellow" cx="280" cy="175" rx="50" ry="30" opacity="0.4"/>
  <ellipse class="tree-medium" cx="380" cy="180" rx="40" ry="28" opacity="0.3"/>
</svg>
